<svg width="100%" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes run { 0%{transform:translateX(940px)} 100%{transform:translateX(-100px)} }
    @keyframes legF { 0%,100%{transform:rotate(-38deg)} 50%{transform:rotate(38deg)} }
    @keyframes legB { 0%,100%{transform:rotate(38deg)} 50%{transform:rotate(-38deg)} }
    @keyframes armF { 0%,100%{transform:rotate(42deg)} 50%{transform:rotate(-42deg)} }
    @keyframes armB { 0%,100%{transform:rotate(-42deg)} 50%{transform:rotate(42deg)} }
    @keyframes bob  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes titleIn { 0%{opacity:0;letter-spacing:28px} 100%{opacity:1;letter-spacing:6px} }
    @keyframes subIn   { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:0.8;transform:translateY(0)} }
    @keyframes badgeIn { 0%{opacity:0} 100%{opacity:1} }
    @keyframes scan { 0%{transform:translateY(-30px);opacity:0} 8%{opacity:1} 92%{opacity:0.6} 100%{transform:translateY(250px);opacity:0} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulse { 0%,100%{opacity:0.08} 50%{opacity:0.18} }
    @keyframes dash1 { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-80} }
    @keyframes dash2 { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-60} }
    @keyframes float1 { 0%,100%{transform:translateY(0);opacity:0.5} 50%{transform:translateY(-14px);opacity:1} }
    @keyframes float2 { 0%,100%{transform:translateY(0);opacity:0.3} 50%{transform:translateY(-10px);opacity:0.8} }
    @keyframes float3 { 0%,100%{transform:translateY(0);opacity:0.6} 50%{transform:translateY(-8px);opacity:0.9} }
    @keyframes pkUp1  { 0%{transform:translateY(0);opacity:0.4} 100%{transform:translateY(-200px);opacity:0} }
    @keyframes pkUp2  { 0%{transform:translateY(0);opacity:0.3} 100%{transform:translateY(-160px);opacity:0} }
    @keyframes cornerPulse { 0%,100%{opacity:0.45} 50%{opacity:0.8} }
    @keyframes gndPulse { 0%,100%{opacity:0.18} 50%{opacity:0.45} }
    @keyframes glowPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes shadowBob { 0%,100%{transform:scaleX(1);opacity:0.12} 50%{transform:scaleX(0.7);opacity:0.06} }

    .runner-group { animation: run 5.5s linear infinite; }
    .body-bob     { animation: bob 0.38s ease-in-out infinite; }
    .leg-f        { transform-origin:0 0; animation: legF 0.38s ease-in-out infinite; }
    .leg-b        { transform-origin:0 0; animation: legB 0.38s ease-in-out infinite; }
    .arm-f        { transform-origin:0 0; animation: armF 0.38s ease-in-out infinite; }
    .arm-b        { transform-origin:0 0; animation: armB 0.38s ease-in-out infinite; }
    .title        { animation: titleIn 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
    .subtitle     { animation: subIn  1s ease 1.6s both; }
    .badge        { animation: badgeIn 1s ease 2.2s both; }
    .cursor       { animation: blink 1s step-end infinite 2s; }
    .scan-line    { animation: scan 4s linear infinite; }
    .grid-h       { animation: pulse 3s ease-in-out infinite; }
    .circ1        { animation: dash1 2.5s linear infinite; }
    .circ2        { animation: dash2 3.5s linear infinite; }
    .circ3        { animation: dash1 4s linear infinite 1s; }
    .circ4        { animation: dash2 3s linear infinite 0.5s; }
    .p1           { animation: float1 3.2s ease-in-out infinite; }
    .p2           { animation: float2 4.1s ease-in-out 0.7s infinite; }
    .p3           { animation: float3 3.7s ease-in-out 1.3s infinite; }
    .p4           { animation: float1 4.5s ease-in-out 0.3s infinite; }
    .p5           { animation: float2 3.4s ease-in-out 1.8s infinite; }
    .p6           { animation: float3 4.8s ease-in-out 0.9s infinite; }
    .pk1          { animation: pkUp1 4s ease-in infinite; }
    .pk2          { animation: pkUp2 5s ease-in 1.5s infinite; }
    .pk3          { animation: pkUp1 4.5s ease-in 3s infinite; }
    .corners      { animation: cornerPulse 2.5s ease-in-out infinite; }
    .gnd          { animation: gndPulse 2.5s ease-in-out infinite; }
    .glow         { animation: glowPulse 2s ease-in-out infinite; }
    .shadow       { animation: shadowBob 0.38s ease-in-out infinite; }
  </style>

  <clipPath id="clip"><rect width="860" height="220" rx="12"/></clipPath>
  <filter id="blur2"><feGaussianBlur stdDeviation="2.5"/></filter>
  <filter id="blur1"><feGaussianBlur stdDeviation="1"/></filter>
</defs>

<g clip-path="url(#clip)">

  <!-- BG -->
  <rect width="860" height="220" fill="#040d18" rx="12"/>
  <rect width="860" height="220" fill="#071525" opacity="0.6"/>

  <!-- GRID -->
  <g class="grid-h" stroke="#00e5ff" stroke-width="0.4" opacity="1">
    <line x1="0" y1="40"  x2="860" y2="40"/>
    <line x1="0" y1="80"  x2="860" y2="80"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="0" y1="160" x2="860" y2="160"/>
    <line x1="0" y1="200" x2="860" y2="200"/>
    <line x1="43"  y1="0" x2="43"  y2="220"/>
    <line x1="86"  y1="0" x2="86"  y2="220"/>
    <line x1="172" y1="0" x2="172" y2="220"/>
    <line x1="258" y1="0" x2="258" y2="220"/>
    <line x1="344" y1="0" x2="344" y2="220"/>
    <line x1="430" y1="0" x2="430" y2="220"/>
    <line x1="516" y1="0" x2="516" y2="220"/>
    <line x1="602" y1="0" x2="602" y2="220"/>
    <line x1="688" y1="0" x2="688" y2="220"/>
    <line x1="774" y1="0" x2="774" y2="220"/>
    <line x1="817" y1="0" x2="817" y2="220"/>
  </g>

  <!-- CIRCUIT TRACES -->
  <g fill="none" stroke-width="0.9" stroke-linecap="round">
    <polyline class="circ1" points="0,55 100,55 100,90 160,90" stroke="#00e5ff" opacity="0.18" stroke-dasharray="5,7"/>
    <polyline class="circ2" points="0,145 70,145 70,115 130,115" stroke="#00e5ff" opacity="0.14" stroke-dasharray="4,8"/>
    <polyline class="circ3" points="860,70 760,70 760,105 700,105" stroke="#7c4dff" opacity="0.18" stroke-dasharray="5,7"/>
    <polyline class="circ4" points="860,155 780,155 780,130 720,130" stroke="#7c4dff" opacity="0.14" stroke-dasharray="4,6"/>
    <polyline class="circ1" points="240,0 240,35 280,35" stroke="#00e5ff" opacity="0.12" stroke-dasharray="4,7"/>
    <polyline class="circ2" points="600,220 600,185 560,185" stroke="#7c4dff" opacity="0.12" stroke-dasharray="4,7"/>
  </g>
  <!-- Circuit nodes -->
  <g fill="#00e5ff" opacity="0.3">
    <circle cx="160" cy="90" r="2.5"/>
    <circle cx="130" cy="115" r="2.5"/>
    <circle cx="280" cy="35" r="2"/>
  </g>
  <g fill="#7c4dff" opacity="0.3">
    <circle cx="700" cy="105" r="2.5"/>
    <circle cx="720" cy="130" r="2.5"/>
    <circle cx="560" cy="185" r="2"/>
  </g>

  <!-- SCAN LINE -->
  <rect class="scan-line" x="0" y="0" width="860" height="28" fill="url(#scanGrad)" opacity="0.07"/>
  <defs>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- FLOATING PARTICLES -->
  <circle class="p1" cx="48"  cy="55"  r="1.8" fill="#00e5ff"/>
  <circle class="p2" cx="110" cy="170" r="1.4" fill="#00e5ff"/>
  <circle class="p3" cx="190" cy="30"  r="2"   fill="#7c4dff"/>
  <circle class="p4" cx="720" cy="50"  r="1.8" fill="#00e5ff"/>
  <circle class="p5" cx="800" cy="140" r="1.4" fill="#7c4dff"/>
  <circle class="p6" cx="660" cy="180" r="2"   fill="#00e5ff"/>
  <circle class="p1" cx="380" cy="18"  r="1.2" fill="#7c4dff"/>
  <circle class="p3" cx="820" cy="85"  r="1.5" fill="#00e5ff"/>
  <circle class="p2" cx="30"  cy="110" r="1.3" fill="#7c4dff"/>

  <!-- DATA PACKETS floating up -->
  <g class="pk1" transform="translate(320,200)">
    <rect x="0" y="0" width="6" height="6" fill="none" stroke="#7c4dff" stroke-width="0.8" opacity="0.5"/>
    <rect x="2" y="2" width="2" height="2" fill="#7c4dff" opacity="0.3"/>
  </g>
  <g class="pk2" transform="translate(540,210)">
    <rect x="0" y="0" width="5" height="5" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
    <rect x="1.5" y="1.5" width="2" height="2" fill="#00e5ff" opacity="0.25"/>
  </g>
  <g class="pk3" transform="translate(150,215)">
    <rect x="0" y="0" width="7" height="7" fill="none" stroke="#7c4dff" stroke-width="0.8" opacity="0.45"/>
    <rect x="2" y="2" width="3" height="3" fill="#7c4dff" opacity="0.2"/>
  </g>

  <!-- GROUND LINE -->
  <line class="gnd" x1="0" y1="192" x2="860" y2="192" stroke="#00e5ff" stroke-width="0.9" stroke-dasharray="7,5"/>

  <!-- CORNER HUD BRACKETS -->
  <g class="corners" stroke="#00e5ff" stroke-width="1.6" fill="none" stroke-linecap="round">
    <polyline points="10,32 10,10 32,10"/>
    <polyline points="850,32 850,10 828,10"/>
    <polyline points="10,188 10,210 32,210"/>
    <polyline points="850,188 850,210 828,210"/>
  </g>
  <g fill="#00e5ff" opacity="0.4">
    <circle cx="10"  cy="10"  r="2"/>
    <circle cx="850" cy="10"  r="2"/>
    <circle cx="10"  cy="210" r="2"/>
    <circle cx="850" cy="210" r="2"/>
  </g>

  <!-- GLOW LAYER behind title -->
  <ellipse class="glow" cx="430" cy="88" rx="200" ry="28" fill="#00e5ff" opacity="0.06" filter="url(#blur2)"/>

  <!-- MAIN TITLE -->
  <text class="title"
    x="430" y="97"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="40"
    font-weight="700"
    fill="#00e5ff"
    letter-spacing="6"
    opacity="0">CAMPUS SENSOR API</text>

  <!-- Title shadow/glow layer -->
  <text class="title"
    x="432" y="99"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="40"
    font-weight="700"
    fill="#00e5ff"
    letter-spacing="6"
    opacity="0.12"
    filter="url(#blur2)">CAMPUS SENSOR API</text>

  <!-- BLINKING CURSOR -->
  <text class="cursor"
    x="704" y="97"
    font-family="'Courier New', Courier, monospace"
    font-size="40"
    font-weight="700"
    fill="#00e5ff">_</text>

  <!-- SUBTITLE -->
  <text class="subtitle"
    x="430" y="124"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    fill="#80deea"
    letter-spacing="3"
    opacity="0">JAX-RS  ·  REST  ·  Java 17  ·  University of Westminster</text>

  <!-- BADGE -->
  <g class="badge" opacity="0">
    <rect x="330" y="136" width="200" height="22" rx="11"
      fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.35"/>
    <text x="430" y="151"
      text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="11"
      fill="#80deea"
      letter-spacing="2">v1.0.0  ·  5COSC022W</text>
  </g>

  <!-- RUNNING FIGURE -->
  <g class="runner-group">
    <g transform="translate(0,158)">
      <!-- shadow -->
      <ellipse class="shadow" cx="0" cy="33" rx="13" ry="3" fill="#00e5ff"/>

      <g class="body-bob">
        <!-- back arm -->
        <g class="arm-b" style="transform-origin:0px -18px">
          <line x1="0" y1="-18" x2="11" y2="-5" stroke="#00bcd4" stroke-width="2.2" stroke-linecap="round"/>
        </g>
        <!-- back leg -->
        <g class="leg-b" style="transform-origin:0px 0px">
          <line x1="0" y1="0" x2="-9"  y2="16" stroke="#00bcd4" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="-9" y1="16" x2="-5" y2="28" stroke="#00bcd4" stroke-width="2.2" stroke-linecap="round"/>
        </g>
        <!-- torso -->
        <line x1="0" y1="-27" x2="0" y2="0" stroke="#00e5ff" stroke-width="2.8" stroke-linecap="round"/>
        <!-- head -->
        <circle cx="0" cy="-35" r="8" fill="none" stroke="#00e5ff" stroke-width="2.4"/>
        <!-- front leg -->
        <g class="leg-f" style="transform-origin:0px 0px">
          <line x1="0" y1="0" x2="9"  y2="16" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="9" y1="16" x2="13" y2="28" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round"/>
        </g>
        <!-- front arm -->
        <g class="arm-f" style="transform-origin:0px -18px">
          <line x1="0" y1="-18" x2="-11" y2="-5" stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round"/>
        </g>
      </g>
    </g>
  </g>

  <!-- BORDER -->
  <rect width="860" height="220" rx="12" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.18"/>

</g>
</svg>
